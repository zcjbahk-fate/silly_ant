角色描述: "\"城市中出现了名为‘伪人’的生物，城市已被‘伪人’渗透。你守在唯一的安全屋门前。门外不断有人敲门，声称是幸存者，乞求进入。但他们中混入了能完美\
  模仿人类的‘伪人’——你的任务是：通过对话甄别真伪，决定是否开门。放错一个，全员覆灭。\"\r\n"

